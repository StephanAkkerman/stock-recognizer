name: Publish Python Package

on:
    release:
        types: [published]

jobs:
    build-and-publish:
        runs-on: ubuntu-latest

        # Required for OIDC authentication with PyPI trusted publishing.
        permissions:
            id-token: write
            contents: read

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.x"

            - name: Validate release tag matches package version
              env:
                  RELEASE_TAG: ${{ github.ref_name }}
              run: |
                  python - <<'PY'
                  import os
                  import tomllib

                  tag = os.environ["RELEASE_TAG"].strip()
                  tag_version = tag[1:] if tag.startswith("v") else tag

                  with open("pyproject.toml", "rb") as f:
                      pyproject = tomllib.load(f)

                  project_version = pyproject["project"]["version"]

                  if tag_version != project_version:
                      raise SystemExit(
                          f"Release tag version '{tag_version}' does not match pyproject version '{project_version}'."
                      )

                  print(f"Version check passed: {tag_version}")
                  PY

            - name: Install build dependencies
              run: python -m pip install --upgrade pip build

            - name: Build package
              run: python -m build

            - name: Publish package to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
